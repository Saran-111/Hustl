<!DOCTYPE html>
<html>
<head>
    <title>Payment Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 12dp; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 80%; }
        h2 { color: #333; }
        p { color: #666; margin-bottom: 2rem; }
        button { background-color: #00b894; color: white; border: none; padding: 1rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #00a382; }
        .loading { display: none; margin-top: 1rem; color: #00b894; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Secure Authentication</h2>
        <p id="status">Verifying incoming request...</p>
        <div id="auth-ui" style="display:none;">
            <p>Request Key: <strong id="req-key"></strong></p>
            <button onclick="authenticate()">Authorize Payment</button>
        </div>
        <div id="loading" class="loading">Processing...</div>
    </div>

    <script>
        // Extract the key from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const incomingKey = urlParams.get('auth_key');

        if (incomingKey) {
            document.getElementById('status').innerText = "Request received and encrypted.";
            document.getElementById('req-key').innerText = incomingKey;
            document.getElementById('auth-ui').style.display = 'block';
        } else {
            document.getElementById('status').innerText = "Invalid authentication request.";
        }

        function authenticate() {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('status').innerText = "Generating response key...";

            // Simulate "Encryption" logic:
            // The response key is the reverse of the incoming key + a salt
            const responseKey = incomingKey.split('').reverse().join('') + "_VERIFIED";

            setTimeout(() => {
                // Send back to Android app via JavascriptInterface
                if (window.Android) {
                    window.Android.onAuthFinished(responseKey);
                }
            }, 2000);
        }
    </script>
</body>
</html>
